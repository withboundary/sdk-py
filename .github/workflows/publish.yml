name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for PyPI Trusted Publishing

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify no Claude artifacts in sdist
        run: |
          set -euo pipefail
          for archive in dist/*.tar.gz; do
            if tar tzf "$archive" | grep -iE 'CLAUDE\.md|\.claude/' ; then
              echo "FAIL: sdist $archive contains Claude artifacts" >&2
              exit 1
            fi
          done

      - name: Verify no Claude artifacts in wheel
        run: |
          set -euo pipefail
          for archive in dist/*.whl; do
            if unzip -l "$archive" | grep -iE 'CLAUDE\.md|\.claude/' ; then
              echo "FAIL: wheel $archive contains Claude artifacts" >&2
              exit 1
            fi
          done

      - name: Stash dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Read version from pyproject.toml
        id: meta
        run: |
          VERSION=$(python -c "import tomllib,pathlib;print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
